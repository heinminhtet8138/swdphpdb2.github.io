<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /*  
            Absolute unit - အရွယ်အစားကို အတိအကျ အသေသတ်မှတ်
                px - border, box shadows, text shadows, border radius, max-width limits

                pt (point), cm, mm, in - print ထုတ်တဲ့အခါတွေမှာ သုံး 

        */
        button {
            border: 1px solid black;
            padding: 10px 300px;
        }

        /*  
            percentage (%) - parent element ရဲ့ အရွယ်အစားပေါ်မူတည်ပြီးပြောင်း 

            % - image width = 100%, multi-column layouts ( ဉပမာ- ဘယ်ဘက် sidebar က 30% ဉာဘက် content က 70% )
        */

        .container {
            margin-top: 20px;
            width: 100%;
            background-color: red;
        }

        .box{
            width: 50%; /* Container width ရဲ့ 50% */
            padding: 2%; /* Container width ရဲ့ 2% */
            background-color: gray;
        }

        /*  
        Relative unit - parent element or root element ပေါ်မူတည် ပြီး အရွယ်အစားကိုပြောင်း လဲတဲ့ units

            element (em) - parent element ရဲ့ font size ပေါ် မူတည် 
            em - button (paddin, font size), lin height spacing 
        */

        .em-container {
            font-size: 20px;
        }

        .normal-text {
            font-size: 1em; /* 1em x 20px = 20px */
        }

        .large-text {
            font-size: 2em; /* 2em x 20px = 40px */
        }

        .em-box {
            font-size: 20px;
        }

        .em-box p {
            border: 1px solid black;
            padding: 1em;
            margin: 2em;
        } 

        /* rem - root element 
        default - 16px
            rem - font-size (h1-h6, p, ), gobal layout spacing, grid columns gaps
        */

        html {
            font-size: 32px;
        }

        .header {
            /* 1 x 16 = 16px */
            font-size: 1rem;
        }

        .title {
            /* 2 x 16 = 32 */
            font-size: 2rem;
        }

        .description {
            font-size: 1rem;
            margin-top: 3rem;
        }

        /* vw, vh - view port width, height 100 
            vw,vh - full screen လိုအပ်တဲ့အခါမှာသုံး 
        */

        .vw-container {
            width: 50vw;
            height: 100px;
            background-color: lightblue;
            font-size: 2vw;
        }

        .fullscreen-header {
            height: 100vh;
            background-color: lightcoral;
        }

        /* 
        
            
            

        */

    </style>

</head>
<body>
    <button>Save</button>

    <div class="container">
        <div class="box">Box</div>
    </div>
<!-- em  -->
    <div class="em-container">
        <p class="normal-text">Normal Text</p>
        <p class="large-text">Large text</p>
    </div>

    <div class="em-box">
        <p>box content</p>
    </div>

    <!-- rem -->
     <div class="header">
        <p class="title">Title</p>
        <p class="description">This is rem .</p>
     </div>

     <!-- vw view port width-->
     <div class="vw-container">
        <p>This is viewport width</p>
     </div>

     <!-- vh view port height -->
      <header class="fullscreen-header">
        <p>This is header takes up 100vh</p>
      </header>
</body>
</html>
