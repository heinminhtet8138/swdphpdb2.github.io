<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 
            @media mediatype and (condition) {
                css code 
            }) 
            
            Media Type 
                all - လားလုံး
                screen - computer screen, teblets, phones
                print - printers
                speech - scrren readers

            ဝဘ်ဆိုက်တစ်ခုကို ဖန်တီးတဲ့အခါ အသုံးအများဆုံး စံသတ်မှတ်ချက် ၃ ခု ရှိတယ်ဆိုတာ ရှင်းပြပေးပါ -
            - ဖုန်းမျက်နှာပြင် (Mobile): max-width: 767px (၇၆၇ ပစ်ဆယ်အောက် ငယ်သော Screen များ)
            - တက်ဘလက် (Tablets): min-width: 768px မှ max-width: 1023px ကြား
            - ကွန်ပျူတာ (Desktop): min-width: 1024px (၁၀၂၄ ပစ်ဆယ်ထက် ကြီးသော Screen များ)
        */

        .container {
            padding: 20px;
        }
        .card {
            background-color: #f0f0f0;
            margin: 10px;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.875rem; /* 30px နှင့် ညီမျှသည် */
        }

        /* Desktop */
        @media screen and (min-width: 1024px) {
            .card-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Tablets */
        @media screen and (min-width:768px) and (max-width:1023px) {
            .card-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }

            .card {
                font-size: 1.5rem; /* 24px နှင့် ညီမျှသည် */
            }
        }

        /* Mobile */
        @media screen and (max-width:767px) {
            .card-container {
                display: grid;
                grid-template-columns: 1fr;
            }

            .card {
                font-size: 1.125rem; /* 18px နှင့် ညီမျှသည် */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-container">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
            <div class="card">Card 4</div>
            <div class="card">Card 5</div>

        </div>
    </div>
</body>
</html>
